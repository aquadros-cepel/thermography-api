<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}" lang="en">
  <head>
    <title th:text="#{email.activation.title}">JHipster activation</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" th:href="${baseUrl + '/favicon.ico'}" />
  </head>

  <body>
    <p th:text="#{email.activation.greeting(${user.firstName})}">Dear</p>
    <p th:text="#{email.activation.text1}">Your JHipster account has been created, please click on the URL below to activate it:</p>
    <p></p>
    <p th:text="#{email.activation.text4}">To access the Android application, use your registered login and password.</p>

    <p th:text="#{email.activation.text3}">To access the Web platform, please click the URL below:</p>
    <a th:with="url=(@{|${baseUrl}})" th:href="${url}" th:text="${url}">Activation link</a>
    <p>
      <span th:text="#{email.activation.text2}">Regards, </span>
      <br />
      <em th:text="#{email.signature}">JHipster.</em>
    </p>
  </body>
</html>
